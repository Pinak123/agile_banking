services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - db-data:/app/data
    environment:
      - DB_PATH=/app/data/banking.db
      - JWT_SECRET=simple-banking-secret-key-for-agile-course
      - PORT=3001

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db-data:
